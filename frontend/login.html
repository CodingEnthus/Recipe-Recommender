<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Recipe AI - Midnight Kitchen</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="scene">
    <div class="fridge" id="fridge">
        <div class="fridge-label">
            <h1>SMART RECIPE AI</h1>
            <p>AI-Powered Culinary Intelligence</p>
        </div>
        <div class="logo-container">
            <img src="logo.png" alt="Smart Recipe AI Logo">
        </div>
        <div class="door"></div>
        <div class="light"></div>

        <div class="login-panel">
            <h2>Welcome Chef 🧑‍🍳</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="signupBtn">Create Account</button>
             <button id="loginBtn">Enter Kitchen</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
